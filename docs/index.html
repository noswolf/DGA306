<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGA306 Guides</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 40px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #666;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.12);
        }

        .card a {
            text-decoration: none;
            color: #1a73e8;
            font-size: 18px;
            font-weight: bold;
        }

        .desc {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }

        footer {
            margin-top: 50px;
            text-align: center;
            color: #999;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>DGA306 Course Guides</h1>

    <p>
        Welcome to the DGA306 documentation and HTML guides.
    </p>

    <div class="grid">

        <div class="card">
            <a href="guide1.html">Guide 1</a>
            <div class="desc">
                Introduction and overview.
            </div>
        </div>

        <div class="card">
            <a href="guide2.html">Guide 2</a>
            <div class="desc">
                Intermediate concepts and examples.
            </div>
        </div>

        <div class="card">
            <a href="guide3.html">Guide 3</a>
            <div class="desc">
                Advanced topics and exercises.
            </div>
        </div>

    </div>

    <footer>
        DGA306 • Hosted with GitHub Pages
    </footer>

</div>

</body>
</html>
